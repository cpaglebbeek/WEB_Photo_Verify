<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoVerify License Manager | Standalone</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #60a5fa;
            --success: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --input-bg: #020617;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        .card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }

        .header { 
            text-align: center; 
            margin-bottom: 30px; 
        }
        
        .header h1 { 
            margin: 0; 
            color: var(--accent); 
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header p { 
            color: var(--text-dim); 
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label { 
            display: block; 
            font-size: 0.75rem; 
            color: var(--text-dim); 
            margin-bottom: 8px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
        }

        input, select, textarea { 
            width: 100%; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            color: white; 
            padding: 14px; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus { 
            border-color: var(--accent); 
            outline: none;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 30px; 
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            width: 100%; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }

        .btn-load { background: #475569; }
        .btn-generate { background: var(--accent); margin-top: 10px; }
        .btn-download { background: var(--success); margin-top: 20px; }

        .result { 
            margin-top: 30px; 
            background: #000; 
            padding: 20px; 
            border-radius: 16px; 
            display: none; 
            border: 1px solid var(--success);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .path-hint {
            font-family: monospace;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 30px 0;
        }

        .badge {
            background: rgba(96, 165, 250, 0.15);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🎟️ License Manager <span class="badge">V1.2 STANDALONE</span></h1>
                <p>Generate and manage PhotoVerify device licenses locally.</p>
            </div>

            <div class="btn-group">
                <button class="btn-load" onclick="document.getElementById('load-input').click()">📂 Load Existing JSON</button>
                <input type="file" id="load-input" style="display:none" accept=".json" onchange="loadLicense(event)">
            </div>

            <div class="form-group">
                <label>Device ID (Unique Forensic Fingerprint):</label>
                <input type="text" id="dev-id" placeholder="E.g. 5A9F2C81B0D3..." oninput="this.value = this.value.toUpperCase()">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Status:</label>
                    <select id="status">
                        <option value="true">✅ ACTIVE / AUTHORIZED</option>
                        <option value="false">🚫 REVOKED / INACTIVE</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Expiration Type:</label>
                    <select id="expiry-type" onchange="toggleExpiryInput()">
                        <option value="days">Limit by Days</option>
                        <option value="none">Infinite (No Expiry)</option>
                    </select>
                </div>
            </div>

            <div id="days-container" class="form-group">
                <label>Days until expiration (from today):</label>
                <input type="number" id="expiry-days" value="365">
            </div>

            <hr>

            <div class="form-group">
                <label>Customer / Licensee Name:</label>
                <input type="text" id="cust-name" placeholder="Full name of the owner">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Company / Organization:</label>
                    <input type="text" id="comp-name" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Internal Reference ID:</label>
                    <input type="text" id="cust-id" placeholder="E.g. PV-2026-001">
                </div>
            </div>

            <button class="btn-generate" onclick="generateLicense()">⚡ GENERATE LICENSE DATA</button>

            <div id="result-box" class="result">
                <label style="color: var(--success)">Target Server Path:</label>
                <div class="path-hint">/licenses/<span id="path-id" style="color: var(--accent)">DEVICE_ID</span>.json</div>
                
                <label>JSON Content:</label>
                <textarea id="json-out" readonly style="height: 200px; font-family: 'Cascadia Code', Consolas, monospace; color: var(--success); font-size: 0.85rem;"></textarea>
                
                <button onclick="downloadLicense()" class="btn-download">💾 DOWNLOAD [ID].JSON</button>
            </div>
        </div>

        <div class="footer">
            PhotoVerify Forensic Suite &bull; Local-First Security &bull; 2026
        </div>
    </div>

    <script>
        function toggleExpiryInput() {
            const type = document.getElementById('expiry-type').value;
            document.getElementById('days-container').style.display = type === 'days' ? 'block' : 'none';
        }

        function loadLicense(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    document.getElementById('dev-id').value = file.name.replace('.json', '').toUpperCase();
                    document.getElementById('status').value = json.active ? "true" : "false";
                    
                    if (json.expiry > 4000000000000) {
                        document.getElementById('expiry-type').value = 'none';
                    } else {
                        document.getElementById('expiry-type').value = 'days';
                        const remainingDays = Math.round((json.expiry - Date.now()) / (24 * 60 * 60 * 1000));
                        document.getElementById('expiry-days').value = remainingDays > 0 ? remainingDays : 0;
                    }
                    
                    document.getElementById('cust-name').value = json.name || '';
                    document.getElementById('comp-name').value = json.company || '';
                    document.getElementById('cust-id').value = json.customerId || '';
                    
                    toggleExpiryInput();
                    alert("✅ License loaded successfully!");
                } catch (err) {
                    alert("❌ Error: Invalid JSON format.");
                }
            };
            reader.readAsText(file);
        }

        let currentData = null;
        let currentId = '';

        function generateLicense() {
            const id = document.getElementById('dev-id').value.trim().toUpperCase();
            if (id.length < 8) return alert("⚠️ Invalid Device ID. Must be a valid fingerprint (min. 8 chars).");
            
            const active = document.getElementById('status').value === "true";
            const expiryType = document.getElementById('expiry-type').value;
            
            let expiryTs;
            if (expiryType === 'none') {
                expiryTs = 9999999999999;
            } else {
                const days = parseInt(document.getElementById('expiry-days').value);
                expiryTs = Date.now() + (days * 24 * 60 * 60 * 1000);
            }
            
            currentId = id;
            currentData = {
                active: active,
                expiry: expiryTs,
                name: document.getElementById('cust-name').value.trim(),
                company: document.getElementById('comp-name').value.trim(),
                customerId: document.getElementById('cust-id').value.trim(),
                message: active ? "License Verified" : "License Revoked by Admin",
                generated: new Date().toISOString(),
                version: "1.2"
            };

            document.getElementById('json-out').value = JSON.stringify(currentData, null, 2);
            document.getElementById('path-id').innerText = id;
            document.getElementById('result-box').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function downloadLicense() {
            if (!currentData) return;
            const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentId}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
